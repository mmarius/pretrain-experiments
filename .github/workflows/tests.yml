name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout pretrain-experiments
        uses: actions/checkout@v4
        with:
          path: pretrain-experiments

      - name: Checkout OLMo-core
        uses: actions/checkout@v4
        with:
          repository: sbordt/OLMo-core
          ref: pretrain-experiments
          path: OLMo-core

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e "./pretrain-experiments[dev]" h5py

      - name: Run tests
        working-directory: pretrain-experiments
        run: pytest
